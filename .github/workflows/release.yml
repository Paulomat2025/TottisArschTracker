name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet publish windows -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Create ZIP
        run: |
          mkdir release
          Copy-Item publish/ArtTimeTracker.Windows.exe release/TottisArschTracker.exe
          Copy-Item core/fart-sound.wav release/fart-sound.wav
          Compress-Archive -Path release/* -DestinationPath TottisArschTracker-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: TottisArschTracker-Windows.zip

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cd mac && swift build -c release

      - name: Create App Bundle
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          APP="TottisArschTracker.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"

          cp mac/.build/release/ArtTimeTracker "$APP/MacOS/TottisArschTracker"
          cp mac/.build/release/ArtTimeTracker_ArtTimeTracker.bundle/fart-sound.wav "$APP/Resources/fart-sound.wav" 2>/dev/null || cp core/fart-sound.wav "$APP/Resources/fart-sound.wav"

          cat > "$APP/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Tottis Arsch Tracker</string>
              <key>CFBundleIdentifier</key>
              <string>com.paulomat.tottisarschtracker</string>
              <key>CFBundleVersion</key>
              <string>${TAG}</string>
              <key>CFBundleShortVersionString</key>
              <string>${TAG}</string>
              <key>CFBundleExecutable</key>
              <string>TottisArschTracker</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: hdiutil create -volname "TottisArschTracker" -srcfolder TottisArschTracker.app -ov -format UDZO TottisArschTracker-macOS.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: TottisArschTracker-macOS.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build

      - uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            TottisArschTracker-Windows.zip
            TottisArschTracker-macOS.dmg
